version: '3.8'

services:
  # Backend API
  api:
    build:
      context: .
      dockerfile: fraud_detection_mvp/Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./fraud_detection_mvp:/app
    environment:
      - PYTHONPATH=/app
    command: uvicorn src.app:app --host 0.0.0.0 --port 8000

  # Frontend Streamlit
  frontend:
    build:
      context: .
      dockerfile: fraud_detection_mvp/Dockerfile
    ports:
      - "8501:8501"
    volumes:
      - ./fraud_detection_mvp:/app
    environment:
      - PYTHONPATH=/app
    depends_on:
      - api
    command: streamlit run src/frontend.py --server.port 8501 --server.address 0.0.0.0
